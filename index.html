<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard AKC DDPC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --akc-blue: #1a2e8a;
    --akc-orange: #e84e0f;
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.18);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --todo-accent: #8b949e;
    --inprogress-accent: #3b82f6;
    --done-accent: #22c55e;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a1060 0%, #1a2e8a 50%, #0d1117 100%);
    border-bottom: 1px solid rgba(232,78,15,0.3);
    padding: 24px 32px 20px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top:0;left:0;right:0;bottom:0;
    background: repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px);
    pointer-events: none;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 32px; position: relative; z-index: 1; }
  .logo-wrap img { height: 72px; display: block; filter: drop-shadow(0 2px 12px rgba(232,78,15,0.3)); }
  .dashboard-label { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.2em; color: var(--akc-orange); text-transform: uppercase; margin-bottom: 4px; }
  .dashboard-title { font-family: var(--font-display); font-size: 36px; font-weight: 800; letter-spacing: 0.02em; color: #fff; line-height: 1; text-transform: uppercase; }

  /* COUNTDOWN */
  .countdown-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; }
  .countdown-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .countdown-label { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; white-space: nowrap; }
  .countdown-units { display: flex; gap: 12px; align-items: center; }
  .countdown-unit { text-align: center; }
  .countdown-num { font-family: var(--font-display); font-size: 38px; font-weight: 800; color: var(--akc-orange); line-height: 1; display: block; min-width: 56px; }
  .countdown-unit-label { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; display: block; margin-top: 2px; }
  .countdown-sep { font-family: var(--font-display); font-size: 30px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; }
  .delivery-date { margin-left: auto; text-align: right; }
  .delivery-date-label { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; display: block; }
  .delivery-date-val { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: #fff; display: block; }

  /* TOOLBAR */
  .toolbar { max-width: 1200px; margin: 0 auto; padding: 20px 32px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar-section { display: flex; gap: 8px; align-items: center; }
  .toolbar-label { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .sort-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-family: var(--font-display); font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 14px; cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { border-color: var(--border-active); color: var(--text); }
  .sort-btn.active { background: var(--akc-orange); border-color: var(--akc-orange); color: #fff; }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-family: var(--font-body); font-size: 13px;
    padding: 6px 10px; cursor: pointer; outline: none;
  }
  .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* BOARD */
  .board-wrap { max-width: 1200px; margin: 0 auto; padding: 20px 32px 48px; }
  .board-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .task-input {
    flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 14px;
    padding: 0 14px; height: 40px; outline: none; transition: border-color 0.15s;
  }
  .task-input:focus { border-color: var(--akc-orange); }
  .task-input::placeholder { color: var(--text-dim); }
  .lane-select, .assignee-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 13px;
    padding: 0 12px; height: 40px; outline: none; cursor: pointer;
  }
  .add-btn {
    background: var(--akc-orange); border: none; border-radius: 8px; color: #fff;
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 0 20px; height: 40px;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* VIEW MODES */
  .lanes { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
  .flat-list { display: flex; flex-direction: column; gap: 8px; }

  .lane { background: var(--surface); border-radius: 12px; padding: 16px; min-height: 280px; border: 1px solid var(--border); }
  .lane-todo { border-top: 3px solid var(--todo-accent); }
  .lane-inprogress { border-top: 3px solid var(--inprogress-accent); }
  .lane-done { border-top: 3px solid var(--done-accent); }

  .lane-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .lane-label-wrap { display: flex; align-items: center; gap: 8px; }
  .lane-dot { width: 8px; height: 8px; border-radius: 50%; }
  .lane-todo .lane-dot { background: var(--todo-accent); }
  .lane-inprogress .lane-dot { background: var(--inprogress-accent); }
  .lane-done .lane-dot { background: var(--done-accent); }
  .lane-label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
  .lane-count { font-family: var(--font-display); font-size: 11px; font-weight: 700; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--text-muted); }

  /* TASK CARDS */
  .task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; transition: border-color 0.15s; }
  .task-card:hover { border-color: var(--border-active); }
  .flat-list .task-card { margin-bottom: 0; display: grid; grid-template-columns: 1fr 120px 160px auto; align-items: center; gap: 12px; }
  .task-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .flat-list .task-row { display: contents; }
  .task-text { font-size: 13px; color: var(--text); line-height: 1.45; flex: 1; }
  .task-actions { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .flat-list .task-actions { flex-direction: row; align-items: center; }
  .move-btn, .del-btn { background: none; border: none; cursor: pointer; font-size: 11px; padding: 2px 5px; border-radius: 4px; transition: background 0.12s, color 0.12s; color: var(--text-dim); }
  .move-btn:hover { background: var(--surface); color: var(--text-muted); }
  .del-btn:hover { background: rgba(232,78,15,0.12); color: var(--akc-orange); }

  .status-badge {
    display: inline-block; font-family: var(--font-display); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
  }
  .badge-todo { background: rgba(139,148,158,0.12); color: var(--todo-accent); border: 1px solid rgba(139,148,158,0.2); }
  .badge-inprogress { background: rgba(59,130,246,0.12); color: var(--inprogress-accent); border: 1px solid rgba(59,130,246,0.2); }
  .badge-done { background: rgba(34,197,94,0.12); color: var(--done-accent); border: 1px solid rgba(34,197,94,0.2); }

  .assignee-badge {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted);
  }
  .assignee-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }

  .script-link {
    display: inline-block; margin-top: 7px; font-family: var(--font-display); font-size: 10px;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none;
    color: #60a5fa; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
    border-radius: 4px; padding: 2px 8px; transition: background 0.12s;
  }
  .flat-list .script-link { margin-top: 0; }
  .script-link:hover { background: rgba(59,130,246,0.2); }

  .empty-hint { text-align: center; font-size: 12px; color: var(--text-dim); padding: 2rem 0; font-style: italic; }
  .status-bar { max-width: 1200px; margin: 0 auto; padding: 0 32px 12px; display: flex; justify-content: space-between; }
  .status-msg { font-size: 11px; color: var(--text-dim); height: 14px; font-style: italic; }

  /* Flat list header */
  .flat-header { display: grid; grid-template-columns: 1fr 120px 160px auto; gap: 12px; padding: 6px 12px; margin-bottom: 4px; }
  .flat-header span { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

  .group-label { font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 12px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }

  @media (max-width: 768px) {
    .lanes { grid-template-columns: 1fr; }
    .flat-list .task-card { grid-template-columns: 1fr auto; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>

<script>
const STORAGE_KEY = 'akc_tasks_v3';
const LANES = ['todo','inprogress','done'];
const LANE_LABELS = { todo:'To Do', inprogress:'In Progress', done:'Done' };

const ASSIGNEE_COLORS = {
  Brad: '#e84e0f', Jeff: '#3b82f6', Mike: '#22c55e',
  Sammy: '#a855f7', Tupelo: '#f59e0b'
};

const SCRIPTS = {
  'Performance Blue': 'https://www.dropbox.com/scl/fi/a7f4ptg72r7vkngug3yvn/AKCPERF_Blue-Compare_0326.pages?rlkey=6mxbs1najjx66nt2yu31rlumn&dl=0',
  'Performance Ella': 'https://www.dropbox.com/scl/fi/aw1rihsbiv8v7bg6x3z38/AKCPERF_Ella-3inches_0326.pages?rlkey=gs1iaazdd6cm93fagde7ktiyt&dl=0',
  'Tail of the tape (Smidgen vs London)': 'https://www.dropbox.com/scl/fi/0y7pdhp76uz6o90r77m0w/AKCPERF_Tail-of-the-Tape_0326.pages?rlkey=sz8a958u5kgwhc64fbrrswy7e&dl=0'
};

const SEED = [
  { id:1, text:'Finish Line Cut of AR', lane:'todo', assignee:'' },
  { id:2, text:'Send Mike all graphics and rough cuts of Performance', lane:'todo', assignee:'Brad' },
  { id:3, text:'Sammy makes show open and Performance Interstitial', lane:'todo', assignee:'Sammy' },
  { id:4, text:'Performance Ella', lane:'inprogress', assignee:'Brad' },
  { id:5, text:'Performance Blue', lane:'inprogress', assignee:'Brad' },
  { id:6, text:'Tail of the tape (Smidgen vs London)', lane:'inprogress', assignee:'Jeff' },
  { id:7, text:'Multi-Cam Distance Jump (Acts 1-6)', lane:'done', assignee:'' },
  { id:8, text:'Performance Flynn', lane:'done', assignee:'' },
  { id:9, text:'Performance Juno', lane:'done', assignee:'' }
];

let tasks = [];
let currentView = 'board';
let currentSort = 'status';
let statusTimeout;

// COUNTDOWN
const DELIVER = new Date('2026-04-04T00:00:00');
function updateCountdown() {
  const diff = DELIVER - new Date();
  if (diff <= 0) { ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00'); return; }
  document.getElementById('cd-days').textContent  = String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-mins').textContent  = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-secs').textContent  = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}
setInterval(updateCountdown,1000); updateCountdown();

// STATE
function setView(v) {
  currentView = v;
  document.getElementById('btn-board').classList.toggle('active', v==='board');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}

function setSort(s) {
  currentSort = s;
  ['status','assignee','task'].forEach(k => document.getElementById('btn-sort-'+k).classList.toggle('active', s===k));
  render();
}

function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => el.textContent = '', 2500);
}

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (p && p.length) { tasks = p; } else { tasks = SEED.map(t=>({...t})); save(false); } }
    else { tasks = SEED.map(t=>({...t})); save(false); }
  } catch(e) { tasks = SEED.map(t=>({...t})); }
  render();
}

function save(notify=true) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); if(notify) setStatus('Saved'); }
  catch(e) { setStatus('Save failed'); }
}

function addTask() {
  const input = document.getElementById('task-input');
  const lane = document.getElementById('lane-select').value;
  const assignee = document.getElementById('assignee-select').value;
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ id: Date.now(), text, lane, assignee });
  input.value = '';
  render(); save();
}

function moveTask(id, dir) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const ni = LANES.indexOf(t.lane) + dir;
  if (ni<0||ni>=LANES.length) return;
  t.lane = LANES[ni]; render(); save();
}

function deleteTask(id) { tasks = tasks.filter(t=>t.id!==id); render(); save(); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function assigneeBadge(assignee) {
  if (!assignee) return '<span style="font-size:11px;color:var(--text-dim);font-style:italic;">Unassigned</span>';
  const color = ASSIGNEE_COLORS[assignee] || '#8b949e';
  const initials = assignee.substring(0,2).toUpperCase();
  return `<span class="assignee-badge"><span class="assignee-dot" style="background:${color}">${initials}</span>${esc(assignee)}</span>`;
}

function statusBadge(lane) {
  const cls = { todo:'badge-todo', inprogress:'badge-inprogress', done:'badge-done' }[lane];
  return `<span class="status-badge ${cls}">${LANE_LABELS[lane]}</span>`;
}

function scriptLink(text) {
  if (!SCRIPTS[text]) return '';
  return `<a class="script-link" href="${SCRIPTS[text]}" target="_blank">&#128196; Script</a>`;
}

function cardActions(task, showMoveButtons=true) {
  const li = LANES.indexOf(task.lane);
  const left  = showMoveButtons && li>0 ? `<button class="move-btn" onclick="moveTask(${task.id},-1)">←</button>` : '';
  const right = showMoveButtons && li<2 ? `<button class="move-btn" onclick="moveTask(${task.id},1)">→</button>` : '';
  return `${left}${right}<button class="del-btn" onclick="deleteTask(${task.id})">✕</button>`;
}

function getFilteredSorted() {
  const filterA = document.getElementById('filter-assignee').value;
  let list = [...tasks];

  if (filterA) {
    list = list.filter(t => filterA==='Unassigned' ? !t.assignee : t.assignee===filterA);
  }

  if (currentSort==='assignee') {
    list.sort((a,b) => (a.assignee||'zzz').localeCompare(b.assignee||'zzz') || LANES.indexOf(a.lane)-LANES.indexOf(b.lane));
  } else if (currentSort==='task') {
    list.sort((a,b) => a.text.localeCompare(b.text));
  } else {
    list.sort((a,b) => LANES.indexOf(a.lane)-LANES.indexOf(b.lane));
  }
  return list;
}

function render() {
  const container = document.getElementById('board-container');
  const list = getFilteredSorted();

  if (currentView === 'board') {
    let html = '<div class="lanes">';
    LANES.forEach(lane => {
      const lt = list.filter(t=>t.lane===lane);
      html += `<div class="lane lane-${lane}">
        <div class="lane-header">
          <div class="lane-label-wrap"><div class="lane-dot"></div><span class="lane-label">${LANE_LABELS[lane]}</span></div>
          <span class="lane-count">${lt.length}</span>
        </div>`;
      if (!lt.length) { html += `<div class="empty-hint">Nothing here</div>`; }
      lt.forEach(task => {
        html += `<div class="task-card">
          <div class="task-row">
            <span class="task-text">${esc(task.text)}</span>
            <div class="task-actions">${cardActions(task)}</div>
          </div>
          <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${assigneeBadge(task.assignee)}
            ${scriptLink(task.text)}
          </div>
        </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
    container.innerHTML = html;

  } else {
    // LIST VIEW — grouped by sort key
    let html = '';
    if (currentSort === 'assignee') {
      // Group by assignee
      const groups = {};
      list.forEach(t => {
        const key = t.assignee || 'Unassigned';
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      });
      Object.keys(groups).sort().forEach(key => {
        html += `<div class="group-label">${esc(key)}</div>`;
        html += '<div class="flat-list">';
        html += `<div class="flat-header"><span>Task</span><span>Status</span><span>Assignee</span><span>Actions</span></div>`;
        groups[key].forEach(task => {
          html += `<div class="task-card">
            <span class="task-text">${esc(task.text)} ${scriptLink(task.text)}</span>
            <span>${statusBadge(task.lane)}</span>
            <span>${assigneeBadge(task.assignee)}</span>
            <div class="task-actions" style="flex-direction:row">${cardActions(task, false)}</div>
          </div>`;
        });
        html += '</div>';
      });
    } else if (currentSort === 'status') {
      LANES.forEach(lane => {
        const lt = list.filter(t=>t.lane===lane);
        if (!lt.length) return;
        html += `<div class="group-label">${LANE_LABELS[lane]}</div>`;
        html += '<div class="flat-list">';
        html += `<div class="flat-header"><span>Task</span><span>Status</span><span>Assignee</span><span>Actions</span></div>`;
        lt.forEach(task => {
          html += `<div class="task-card">
            <span class="task-text">${esc(task.text)} ${scriptLink(task.text)}</span>
            <span>${statusBadge(task.lane)}</span>
            <span>${assigneeBadge(task.assignee)}</span>
            <div class="task-actions" style="flex-direction:row">${cardActions(task, false)}</div>
          </div>`;
        });
        html += '</div>';
      });
    } else {
      html += '<div class="flat-list">';
      html += `<div class="flat-header"><span>Task</span><span>Status</span><span>Assignee</span><span>Actions</span></div>`;
      list.forEach(task => {
        html += `<div class="task-card">
          <span class="task-text">${esc(task.text)} ${scriptLink(task.text)}</span>
          <span>${statusBadge(task.lane)}</span>
          <span>${assigneeBadge(task.assignee)}</span>
          <div class="task-actions" style="flex-direction:row">${cardActions(task, false)}</div>
        </div>`;
      });
      html += '</div>';
    }
    container.innerHTML = html;
  }
}

document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
loadTasks();
</script>
</body>
</html>
